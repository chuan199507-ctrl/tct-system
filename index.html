<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TcT 個人化訓練系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{--black:#111;--g700:#444;--g500:#888;--g300:#ccc;--g100:#f5f5f5;--g50:#fafafa;--white:#fff;--border:#e5e5e5;--r:10px;--font:'Noto Sans TC',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--g50);color:var(--black);min-height:100vh;padding-bottom:60px}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:15px;font-weight:700;letter-spacing:.5px}
.topbar-sub{font-size:11px;color:var(--g500);margin-top:1px}
.screen{display:none;padding:16px 16px 0;max-width:480px;margin:0 auto}
.screen.active{display:block}
.sec-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g500);margin-bottom:10px;margin-top:20px;font-family:var(--mono)}
.sec-lbl:first-child{margin-top:0}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.student-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.student-card:active{background:var(--g50)}
.student-name{font-size:15px;font-weight:500}
.student-meta{font-size:12px;color:var(--g500);margin-top:2px}
.student-arrow{color:var(--g300);font-size:20px}
.field{margin-bottom:14px}
.field label{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--g500);display:block;margin-bottom:5px;font-family:var(--mono)}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);color:var(--black);background:var(--white);outline:none}
.field input:focus,.field textarea:focus{border-color:var(--black)}
.field textarea{min-height:70px;resize:vertical}
.cat-title{font-size:11px;font-weight:500;color:var(--g700);margin:12px 0 6px}
.move-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:4px}
.chip{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--g700);background:var(--white);cursor:pointer;text-align:left;font-family:var(--font);line-height:1.3;-webkit-user-select:none}
.chip.sel{border-color:var(--black);background:var(--black);color:var(--white);font-weight:500}
.move-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.move-item-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.move-item-name{font-size:14px;font-weight:500;flex:1}
.move-item input.custom-name{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;margin-bottom:8px}
.set-row{display:grid;grid-template-columns:auto 1fr 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px}
.set-label{font-size:11px;color:var(--g500);font-family:var(--mono);min-width:32px}
.set-row input{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--mono);text-align:center;background:var(--g50)}
.set-row input:focus{outline:none;border-color:var(--black)}
.set-rm{width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-size:14px;color:var(--g500);display:flex;align-items:center;justify-content:center}
.add-set-btn{width:100%;padding:8px;border:1px dashed var(--border);border-radius:6px;background:none;color:var(--g500);font-size:12px;cursor:pointer;margin-top:4px}
.rm-move-btn{padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--g500);font-size:12px;cursor:pointer}
.btn{width:100%;padding:13px;background:var(--black);color:var(--white);border:none;border-radius:var(--r);font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;letter-spacing:.3px;margin-top:12px}
.btn:active{opacity:.85}
.btn.sec{background:none;color:var(--black);border:1px solid var(--border);margin-top:8px}
.btn.sec:active{background:var(--g100)}
.btn.danger{background:none;color:#c00;border:1px solid #fcc;margin-top:8px}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:8px;width:auto;margin:0}
.btn.outline-sm{padding:7px 12px;font-size:12px;border-radius:8px;width:auto;margin:0;background:none;color:var(--black);border:1px solid var(--border)}
.add-btn{width:100%;padding:12px;border:1.5px dashed var(--border);border-radius:var(--r);background:none;color:var(--g500);font-size:13px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--g500);font-size:13px;font-family:var(--font);cursor:pointer;padding:0;margin-bottom:16px}
.report-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:4px}
.report-hd{padding:20px;border-bottom:2px solid var(--black)}
.report-hd h2{font-size:16px;font-weight:500}
.report-hd p{font-size:11px;color:var(--g500);margin-top:3px}
.report-meta{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.rmc{padding:12px 16px;border-right:1px solid var(--border)}
.rmc:last-child{border-right:none}
.rmc .lbl{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--g500);margin-bottom:3px;font-family:var(--mono)}
.rmc .val{font-size:13px;font-weight:500}
.report-sec{padding:14px 16px;border-bottom:1px solid var(--border)}
.report-sec:last-child{border-bottom:none}
.rst{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--g500);margin-bottom:10px;display:flex;align-items:center;gap:6px;font-family:var(--mono)}
.rst::after{content:'';flex:1;height:1px;background:var(--border)}
.report-move{margin-bottom:12px}
.report-move-name{font-size:13px;font-weight:500;margin-bottom:6px}
.report-move-custom{font-size:11px;color:var(--g500);margin-bottom:6px}
.report-set{font-size:12px;padding:4px 0;color:var(--g700)}
.hw-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.hw-list li{font-size:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.hw-num{width:18px;height:18px;border-radius:50%;border:1px solid var(--black);font-size:10px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.note-box{background:var(--g50);border-left:2px solid var(--black);padding:10px 12px;font-size:13px;line-height:1.7}
.disclaimer{padding:10px 16px;background:var(--g50);border-top:1px solid var(--border)}
.disclaimer p{font-size:10px;color:var(--g500);text-align:center;line-height:1.6}
.print-bar{display:flex;gap:8px;margin-top:12px}
.hist-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer}
.hist-card:active{background:var(--g50)}
.hist-date{font-size:13px;font-weight:500}
.hist-moves{font-size:12px;color:var(--g500);margin-top:3px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.stat-num{font-size:24px;font-weight:500;font-family:var(--mono)}
.stat-lbl{font-size:11px;color:var(--g500);margin-top:2px}
.freq-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)}
.freq-item:last-child{border-bottom:none}
.freq-name{font-size:13px;flex:1}
.freq-bar-bg{width:80px;height:6px;background:var(--g100);border-radius:3px;flex-shrink:0}
.freq-bar{height:6px;background:var(--black);border-radius:3px}
.freq-count{font-size:11px;color:var(--g500);font-family:var(--mono);min-width:24px;text-align:right}
.chart-wrap{position:relative;height:200px;margin-top:8px}
.move-select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--black);background:var(--white);outline:none;margin-bottom:12px}
.tab-row{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.tab{flex:1;padding:9px;font-size:12px;font-family:var(--font);background:none;border:none;cursor:pointer;color:var(--g500)}
.tab.active{background:var(--black);color:var(--white);font-weight:500}
.empty-state{text-align:center;padding:40px 20px;color:var(--g500);font-size:13px}
.empty-state .icon{font-size:32px;margin-bottom:8px}
.topbar-right{display:flex;gap:8px}
@media print{
  @page{margin:15mm;size:A4}
  body{background:white;padding:0;margin:0}
  .topbar,.screen>*:not(.report-wrap),.print-bar{display:none!important}
  .screen{padding:0;max-width:100%;margin:0}
  .report-wrap{border:none;page-break-after:avoid}
  .report-hd{font-size:18px}
  .report-hd h2{font-size:20px}
  .report-hd p{font-size:13px}
  .rmc .lbl{font-size:11px}
  .rmc .val{font-size:15px}
  .rst{font-size:12px}
  .report-move-name{font-size:15px}
  .report-move-custom{font-size:13px}
  .report-set{font-size:14px}
  .hw-list li{font-size:15px}
  .note-box{font-size:15px;line-height:1.8}
  .disclaimer{page-break-before:avoid}
  .disclaimer p{font-size:11px}
  a[href]:after{content:none!important}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">TcT 個人化訓練</div>
    <div class="topbar-sub" id="topbar-sub">學員管理</div>
  </div>
  <div class="topbar-right" id="topbar-right"></div>
</div>

<div class="screen active" id="screen-list">
  <div class="sec-lbl">學員列表</div>
  <div id="student-list"></div>
  <button class="add-btn" onclick="goAddStudent()">＋ 新增學員</button>
  
  <div class="sec-lbl">資料管理</div>
  <div style="display:flex;gap:8px">
    <button class="btn sec" style="flex:1;margin:0" onclick="exportData()">匯出資料</button>
    <button class="btn sec" style="flex:1;margin:0" onclick="document.getElementById('import-file').click()">匯入資料</button>
  </div>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  <div style="font-size:11px;color:var(--g500);margin-top:8px;text-align:center">匯出後可在其他裝置匯入，資料會自動合併</div>
</div>

<div class="screen" id="screen-detail">
  <button class="back-btn" onclick="goList()">← 返回</button>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <div style="font-size:18px;font-weight:500" id="detail-name"></div>
      <div style="font-size:12px;color:var(--g500)" id="detail-memo"></div>
    </div>
    <button class="btn outline-sm" onclick="goEditStudent()">編輯</button>
  </div>

  <div class="tab-row">
    <button class="tab active" id="tab-session" onclick="switchTab('session')">今日課程</button>
    <button class="tab" id="tab-history" onclick="switchTab('history')">歷史紀錄</button>
    <button class="tab" id="tab-stats" onclick="switchTab('stats')">進步分析</button>
  </div>

  <div id="tab-content-session">
    <div class="sec-lbl">課程日期</div>
    <div class="card" style="padding:12px 16px">
      <input type="date" id="session-date" style="border:none;font-size:14px;font-family:var(--font);color:var(--black);background:none;width:100%;outline:none">
    </div>

    <div class="sec-lbl">訓練內容</div>
    <div id="session-moves-container"></div>
    <button class="add-btn" onclick="showPicker()">＋ 加入動作</button>

    <div class="sec-lbl">回家功課</div>
    <div class="card"><div class="move-grid" id="session-hw"></div></div>
    
    <div class="sec-lbl">回家功課附註</div>
    <div class="card" style="padding:12px 16px">
      <textarea id="session-hw-note" style="border:none;font-size:13px;font-family:var(--font);color:var(--black);background:none;width:100%;outline:none;min-height:50px;resize:vertical" placeholder="回家功課的特別提醒或注意事項..."></textarea>
    </div>

    <div class="sec-lbl">特殊注意事項</div>
    <div class="card" style="padding:12px 16px">
      <textarea id="session-special" style="border:none;font-size:13px;font-family:var(--font);color:var(--black);background:none;width:100%;outline:none;min-height:50px;resize:vertical" placeholder="特別注意、調整事項..."></textarea>
    </div>

    <div class="sec-lbl">教練備註</div>
    <div class="card" style="padding:12px 16px">
      <textarea id="session-note" style="border:none;font-size:13px;font-family:var(--font);color:var(--black);background:none;width:100%;outline:none;min-height:60px;resize:vertical" placeholder="課後觀察、提醒、下次方向..."></textarea>
    </div>

    <button class="btn" onclick="generateReport()">生成課後報告 →</button>
  </div>

  <div id="tab-content-history" style="display:none">
    <div id="history-list"></div>
  </div>

  <div id="tab-content-stats" style="display:none">
    <div class="stat-grid" id="stats-summary"></div>
    <div class="sec-lbl">重量進步曲線</div>
    <div class="card">
      <select class="move-select" id="chart-move-select" onchange="renderChart()"></select>
      <div class="chart-wrap"><canvas id="progress-chart"></canvas></div>
    </div>
    <div class="sec-lbl">動作出現頻率</div>
    <div class="card" id="freq-list"></div>
    <button class="btn sec" onclick="exportObsidian()">匯出至 Obsidian (.md)</button>
  </div>
</div>

<div class="screen" id="screen-edit">
  <button class="back-btn" onclick="goDetail()">← 返回</button>
  <div class="sec-lbl" id="edit-title">新增學員</div>
  <div class="card">
    <div class="field"><label>學員姓名</label><input type="text" id="edit-name" placeholder="輸入姓名"></div>
    <div class="field" style="margin:0"><label>備註</label><textarea id="edit-memo" placeholder="目標、特殊狀況..."></textarea></div>
  </div>
  <div class="sec-lbl">固定課表動作</div>
  <div class="card" id="edit-move-picker"></div>
  <div class="sec-lbl">固定回家功課</div>
  <div class="card"><div class="move-grid" id="edit-hw-picker"></div></div>
  <button class="btn" onclick="saveStudent()">儲存</button>
  <button class="btn danger" id="delete-btn" onclick="deleteStudent()" style="display:none">刪除學員</button>
</div>

<div class="screen" id="screen-picker">
  <button class="back-btn" onclick="closePicker()">← 返回課程</button>
  <div class="sec-lbl">選擇動作</div>
  <div id="picker-content"></div>
  <button class="btn" onclick="closePicker()">確認加入</button>
</div>

<div class="screen" id="screen-report">
  <button class="back-btn" onclick="goDetail()">← 返回</button>
  <div class="sec-lbl">課後報告</div>
  <div class="report-wrap" id="report-content"></div>
  <div class="print-bar">
    <button class="btn" style="margin:0;flex:1" onclick="window.print()">列印 / 儲存 PDF</button>
    <button class="btn sec" style="margin:0;width:auto;padding:13px 16px" onclick="goDetail()">返回</button>
  </div>
</div>

<div class="screen" id="screen-hist-detail">
  <button class="back-btn" onclick="goDetail()">← 返回</button>
  <div class="sec-lbl">歷史紀錄</div>
  <div class="report-wrap" id="hist-report-content"></div>
</div>

<script>
const MOVES={
  '基礎控制':['骨盆中立練習','肩胛骨中立練習','髖關節中心化','肩外旋練習','彈力帶肩胛收縮','彈力帶直臂下壓(感受背闊帶動)','彈力帶招財貓(肩外旋控制)','超人式','下犬式','[自訂動作]'],
  '呼吸核心':['橫膈膜呼吸練習（360全擴張呼吸）','仰臥90-90呼吸','3月趴姿呼吸','[自訂動作]'],
  '核心穩定':['死蟲式','死蟲式（對側延伸）','鳥狗式','棒式（膝蓋）','棒式（肘撐）','棒式（掌撐）','側棒式','側棒式內收','側棒式外展','四足跪姿支撐','[自訂動作]'],
  '背部':['滑輪下拉','滑輪下拉（窄握）','引體向上','引體向上（窄握）','直臂下壓','單手啞鈴划船','槓鈴划船','啞鈴划船（俯身）','海豹式划船','器械划船','Facepull','Pull over','Cable Y平舉','負重聳肩','反式划船','[自訂動作]'],
  '胸部':['槓鈴臥推','槓鈴上胸臥推','啞鈴臥推','啞鈴上胸臥推','地板臥推（槓鈴）','地板臥推（啞鈴）','器械式平胸推','器械式飛鳥夾胸','Cable上斜飛鳥','Cable夾胸','Cable下胸臥推','雙槓撐體','[自訂動作]'],
  '肩部':['啞鈴肩推','槓鈴肩推','地雷管肩推','啞鈴側平舉','Cable 側平舉','後三角飛鳥','[自訂動作]'],
  '手臂':['啞鈴二頭彎舉','垂式彎舉','斜躺二頭彎舉','傳教士彎舉','啞鈴法式伸展','Cable三頭伸展','Cable過頭三頭伸展','[自訂動作]'],
  '下肢':['箱上蹲','高腳杯深蹲','SSB槓深蹲','槓鈴深蹲','壺鈴深蹲','六角槓深蹲','Zercher Squat','原地分腿蹲','後腳抬高蹲','登階','單腳硬舉','羅馬尼亞硬舉','六角槓硬舉','後腳著地RDL','單腳RDL','相撲硬舉','槓鈴臀推','啞鈴臀推','臀橋','側蹲','螃蟹走','北歐彎舉','反向北歐彎舉','藥球腿後勾','[自訂動作]'],
  '功能性':['高跪姿藥球風車式','負重行走（雙手）','負重行走（單邊）','壺鈴擺盪','壺鈴側甩','弓箭步走','伐木者','Cable旋轉','抗側曲','Arm bar','土耳其站立','多平面動作訓練','動力鏈訓練','小熊爬','大熊爬','蜥蜴爬','鳥狗式划船','[自訂動作]']
};
const HW_OPT=['橫膈膜呼吸練習','髖屈肌伸展','胸椎活動度練習','滾筒大腿放鬆','滾筒背部放鬆','肩關節外旋練習','骨盆中立覺察','維持活動量','確保睡眠充足','補充水分','姿勢覺察（辦公室）','核心啟動練習','死蟲式自主練習','髖關節放鬆','控制飲食恢復','足底按摩球放鬆'];

let students=JSON.parse(localStorage.getItem('tct_v4_students')||'[]');
let sessions=JSON.parse(localStorage.getItem('tct_v4_sessions')||'{}');
let cur=null;
let sessionMoves=[];
let sessionHW=new Set();
let pickerSel=new Set();
let chartInst=null;
let isNewStudent=false;

function persist(){
  localStorage.setItem('tct_v4_students',JSON.stringify(students));
  localStorage.setItem('tct_v4_sessions',JSON.stringify(sessions));
}

function getCat(moveName){
  for(let[cat,moves]of Object.entries(MOVES)){
    if(moves.includes(moveName))return cat;
  }
  return '';
}

function getSessions(sid){return sessions[sid]||[];}
function addSession(sid,s){if(!sessions[sid])sessions[sid]=[];sessions[sid].unshift(s);persist();}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
}

function goList(){
  renderStudentList();
  document.getElementById('topbar-sub').textContent='學員管理';
  document.getElementById('topbar-right').innerHTML='';
  showScreen('list');
}

function goDetail(){
  if(cur===null)return goList();
  const s=students[cur];
  document.getElementById('detail-name').textContent=s.name;
  document.getElementById('detail-memo').textContent=s.memo||'';
  document.getElementById('topbar-sub').textContent=s.name;
  switchTab('session');
  showScreen('detail');
}

function switchTab(t){
  ['session','history','stats'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
    document.getElementById('tab-content-'+x).style.display=x===t?'block':'none';
  });
  if(t==='history')renderHistory();
  if(t==='stats')renderStats();
}

function goAddStudent(){
  isNewStudent=true;
  document.getElementById('edit-title').textContent='新增學員';
  document.getElementById('edit-name').value='';
  document.getElementById('edit-memo').value='';
  document.getElementById('delete-btn').style.display='none';
  renderEditPicker(new Set(),new Set());
  showScreen('edit');
}

function goEditStudent(){
  isNewStudent=false;
  const s=students[cur];
  document.getElementById('edit-title').textContent='編輯學員';
  document.getElementById('edit-name').value=s.name;
  document.getElementById('edit-memo').value=s.memo||'';
  document.getElementById('delete-btn').style.display='block';
  renderEditPicker(new Set(s.defaultMoves||[]),new Set(s.defaultHW||[]));
  showScreen('edit');
}

function showPicker(){
  pickerSel=new Set(sessionMoves.map(m=>m.name));
  let html='';
  Object.entries(MOVES).forEach(([cat,moves])=>{
    html+=`<div class="cat-title">${cat}</div><div class="move-grid">`;
    moves.forEach(m=>{
      html+=`<button class="chip ${pickerSel.has(m)?'sel':''}" onclick="togglePick(this,'${m.replace(/'/g,"\\'")}')">${m}</button>`;
    });
    html+='</div>';
  });
  document.getElementById('picker-content').innerHTML=html;
  showScreen('picker');
}

function togglePick(btn,name){
  btn.classList.toggle('sel');
  if(btn.classList.contains('sel'))pickerSel.add(name);
  else pickerSel.delete(name);
}

function closePicker(){
  const cur_names=new Set(sessionMoves.map(m=>m.name));
  pickerSel.forEach(n=>{
    if(!cur_names.has(n)){
      sessionMoves.push({name:n,sets:[{w:'',r:'',sec:''}],customName:''});
    }
  });
  sessionMoves=sessionMoves.filter(m=>pickerSel.has(m.name));
  renderSessionMoves();
  showScreen('detail');
}

function renderStudentList(){
  const el=document.getElementById('student-list');
  if(!students.length){el.innerHTML=`<div class="empty-state"><div class="icon">👤</div>尚未新增學員</div>`;return;}
  el.innerHTML=students.map((s,i)=>{
    const sc=getSessions(i).length;
    return`<div class="student-card" onclick="openStudent(${i})">
      <div style="flex:1">
        <div class="student-name">${s.name}</div>
        <div class="student-meta">${(s.defaultMoves||[]).length} 固定動作・${sc} 堂紀錄</div>
      </div>
      <span class="student-arrow">›</span>
    </div>`;
  }).join('');
}

function openStudent(i){
  cur=i;
  const s=students[i];
  sessionMoves=(s.defaultMoves||[]).map(m=>({name:m,sets:[{w:'',r:'',sec:''}],customName:''}));
  sessionHW=new Set(s.defaultHW||[]);
  document.getElementById('session-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('session-note').value='';
  document.getElementById('session-special').value='';
  document.getElementById('session-hw-note').value='';
  renderSessionMoves();
  renderSessionHW();
  goDetail();
}

function renderSessionMoves(){
  const c=document.getElementById('session-moves-container');
  if(!sessionMoves.length){
    c.innerHTML=`<div class="empty-state" style="padding:20px"><div class="icon">💪</div>尚未選擇動作</div>`;
    return;
  }
  c.innerHTML=sessionMoves.map((m,mi)=>{
    const showCustom=m.name==='[自訂動作]';
    let html=`<div class="move-item">`;
    html+=`<div class="move-item-hd">
      <div class="move-item-name">${showCustom?'<span style="color:var(--g500)">自訂動作</span>':m.name}</div>
      <button class="rm-move-btn" onclick="sessionMoves.splice(${mi},1);renderSessionMoves()">刪除</button>
    </div>`;
    html+=`<input type="text" class="custom-name" value="${m.customName}" placeholder="${showCustom?'輸入動作名稱':'備註'}" oninput="sessionMoves[${mi}].customName=this.value">`;
    m.sets.forEach((s,si)=>{
      html+=`<div class="set-row">
        <div class="set-label">組${si+1}</div>
        <input type="text" value="${s.w}" placeholder="kg" oninput="sessionMoves[${mi}].sets[${si}].w=this.value">
        <input type="text" value="${s.r}" placeholder="10次" oninput="sessionMoves[${mi}].sets[${si}].r=this.value">
        <input type="text" value="${s.sec}" placeholder="秒" oninput="sessionMoves[${mi}].sets[${si}].sec=this.value">
        <button class="set-rm" onclick="sessionMoves[${mi}].sets.splice(${si},1);renderSessionMoves()">×</button>
      </div>`;
    });
    html+=`<button class="add-set-btn" onclick="sessionMoves[${mi}].sets.push({w:'',r:'',sec:''});renderSessionMoves()">＋ 新增組數</button>`;
    html+=`</div>`;
    return html;
  }).join('');
}

function renderSessionHW(){
  document.getElementById('session-hw').innerHTML=HW_OPT.map(h=>`
    <button class="chip ${sessionHW.has(h)?'sel':''}" onclick="toggleSHW(this,'${h.replace(/'/g,"\\'")}')">${h}</button>
  `).join('');
}

function toggleSHW(btn,name){
  btn.classList.toggle('sel');
  if(btn.classList.contains('sel'))sessionHW.add(name);
  else sessionHW.delete(name);
}

function renderEditPicker(selMoves,selHW){
  let html='';
  Object.entries(MOVES).forEach(([cat,moves])=>{
    html+=`<div class="cat-title">${cat}</div><div class="move-grid">`;
    moves.forEach(m=>html+=`<button class="chip ${selMoves.has(m)?'sel':''}" onclick="this.classList.toggle('sel')">${m}</button>`);
    html+='</div>';
  });
  document.getElementById('edit-move-picker').innerHTML=html;
  document.getElementById('edit-hw-picker').innerHTML=HW_OPT.map(h=>
    `<button class="chip ${selHW.has(h)?'sel':''}" onclick="this.classList.toggle('sel')">${h}</button>`
  ).join('');
}

function saveStudent(){
  const name=document.getElementById('edit-name').value.trim();
  if(!name){alert('請輸入學員姓名');return;}
  const dm=[...document.querySelectorAll('#edit-move-picker .chip.sel')].map(b=>b.textContent);
  const dh=[...document.querySelectorAll('#edit-hw-picker .chip.sel')].map(b=>b.textContent);
  const data={name,memo:document.getElementById('edit-memo').value,defaultMoves:dm,defaultHW:dh};
  if(isNewStudent){students.push(data);cur=students.length-1;}
  else students[cur]=data;
  persist();
  if(isNewStudent)openStudent(cur);
  else goDetail();
}

function deleteStudent(){
  if(!confirm(`確定刪除 ${students[cur].name}？`))return;
  students.splice(cur,1);
  delete sessions[cur];
  persist();
  cur=null;
  goList();
}

function generateReport(){
  const s=students[cur];
  const date=document.getElementById('session-date').value;
  const note=document.getElementById('session-note').value;
  const special=document.getElementById('session-special').value;
  const hwNote=document.getElementById('session-hw-note').value;
  const hw=[...sessionHW];
  const sessionData={date,moves:sessionMoves.map(m=>({...m})),hw,hwNote,note,special,ts:Date.now()};
  addSession(cur,sessionData);
  const html=buildReportHTML(s.name,date,sessionMoves,hw,hwNote,special,note);
  document.getElementById('report-content').innerHTML=html;
  showScreen('report');
}

function buildReportHTML(name,date,moves,hw,hwNote,special,note){
  const dateStr=date.replace(/-/g,' / ');
  const mvHTML=moves.length
    ?moves.map(m=>{
      const displayName=m.name==='[自訂動作]'&&m.customName?m.customName:m.name;
      const custom=m.customName&&m.name!=='[自訂動作]'?`<div class="report-move-custom">${m.customName}</div>`:'';
      const setsHTML=(m.sets||[]).map((s,i)=>{
        const parts=[];
        if(s.w)parts.push(`${s.w}kg`);
        if(s.r)parts.push(`${s.r}次`);
        if(s.sec)parts.push(`${s.sec}秒`);
        return`<div class="report-set">組${i+1}：${parts.join(' × ')||'—'}</div>`;
      }).join('');
      return`<div class="report-move"><div class="report-move-name">${displayName}</div>${custom}${setsHTML}</div>`;
    }).join('')
    :`<div style="font-size:13px;color:var(--g500)">未記錄</div>`;
  const hwHTML=hw.length
    ?`<ul class="hw-list">${hw.map((h,i)=>`<li><span class="hw-num">${i+1}</span>${h}</li>`).join('')}</ul>${hwNote?`<div class="note-box" style="margin-top:10px">${hwNote}</div>`:''}`
    :`<div style="font-size:13px;color:var(--g500)">本次無指定回家功課</div>`;
  const specialHTML=special
    ?`<div class="note-box">${special}</div>`
    :`<div style="font-size:13px;color:var(--g500)">本次無特殊注意事項</div>`;
  const noteHTML=note
    ?`<div class="note-box">${note}</div>`
    :`<div style="font-size:13px;color:var(--g500)">本次無特別備註</div>`;
  return`
    <div class="report-hd"><h2>個人化訓練紀錄與動作優化報告</h2><p>科學化動態評估 × 動作控制優化｜TcT 個人化訓練</p></div>
    <div class="report-meta">
      <div class="rmc"><div class="lbl">學員姓名</div><div class="val">${name}</div></div>
      <div class="rmc"><div class="lbl">課程日期</div><div class="val">${dateStr}</div></div>
    </div>
    <div class="report-sec"><div class="rst">本次訓練內容</div>${mvHTML}</div>
    <div class="report-sec"><div class="rst">回家功課</div>${hwHTML}</div>
    <div class="report-sec"><div class="rst">特殊注意事項</div>${specialHTML}</div>
    <div class="report-sec"><div class="rst">教練備註</div>${noteHTML}</div>
    <div class="disclaimer"><p>如需醫療建議或診斷，請諮詢專業醫療人員。本報告內容僅供訓練參考，不構成任何醫療意見。</p></div>`;
}

function renderHistory(){
  const list=getSessions(cur);
  const el=document.getElementById('history-list');
  if(!list.length){el.innerHTML=`<div class="empty-state"><div class="icon">📋</div>尚無課程紀錄</div>`;return;}
  el.innerHTML=list.map((s,i)=>{
    const moveNames=(s.moves||[]).map(m=>m.name==='[自訂動作]'&&m.customName?m.customName:m.name).join('・');
    return`<div class="hist-card" onclick="showHistDetail(${i})">
      <div class="hist-date">${s.date}</div>
      <div class="hist-moves">${moveNames}</div>
    </div>`;
  }).join('');
}

function showHistDetail(i){
  const s=students[cur];
  const sess=getSessions(cur)[i];
  document.getElementById('hist-report-content').innerHTML=buildReportHTML(s.name,sess.date,sess.moves||[],sess.hw||[],sess.hwNote||'',sess.special||'',sess.note||'');
  showScreen('hist-detail');
}

function renderStats(){
  const list=getSessions(cur);
  const total=list.length;
  const allMoves=list.flatMap(s=>(s.moves||[]).map(m=>m.name==='[自訂動作]'&&m.customName?m.customName:m.name));
  const uniqueMoves=new Set(allMoves).size;
  const lastDate=list.length?list[0].date:'—';
  document.getElementById('stats-summary').innerHTML=`
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">總課程次數</div></div>
    <div class="stat-box"><div class="stat-num">${uniqueMoves}</div><div class="stat-lbl">使用動作種類</div></div>
    <div class="stat-box"><div class="stat-num">${list.length?list[list.length-1].date:'—'}</div><div class="stat-lbl">首次上課</div></div>
    <div class="stat-box"><div class="stat-num">${lastDate}</div><div class="stat-lbl">最近上課</div></div>`;

  const allSets=list.flatMap(s=>(s.moves||[]).flatMap(m=>(m.sets||[]).map(set=>({name:m.name==='[自訂動作]'&&m.customName?m.customName:m.name,w:set.w,date:s.date}))));
  const movesWithWeight=allSets.filter(s=>s.w&&parseFloat(s.w)>0);
  const movesSet=[...new Set(movesWithWeight.map(s=>s.name))];
  const sel=document.getElementById('chart-move-select');
  sel.innerHTML=movesSet.length
    ?movesSet.map(m=>`<option value="${m}">${m}</option>`).join('')
    :`<option>（無重量紀錄）</option>`;
  renderChart();

  const freq={};
  allMoves.forEach(m=>{freq[m]=(freq[m]||0)+1;});
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max=sorted[0]?sorted[0][1]:1;
  document.getElementById('freq-list').innerHTML=sorted.length
    ?sorted.map(([n,c])=>`
      <div class="freq-item">
        <div class="freq-name">${n}</div>
        <div class="freq-bar-bg"><div class="freq-bar" style="width:${Math.round(c/max*100)}%"></div></div>
        <div class="freq-count">${c}</div>
      </div>`).join('')
    :`<div style="font-size:13px;color:var(--g500);padding:8px 0">尚無資料</div>`;
}

function renderChart(){
  const moveName=document.getElementById('chart-move-select').value;
  const list=getSessions(cur).slice().reverse();
  const allSets=list.flatMap(s=>(s.moves||[]).flatMap(m=>{
    const name=m.name==='[自訂動作]'&&m.customName?m.customName:m.name;
    return(m.sets||[]).filter(set=>name===moveName&&set.w&&parseFloat(set.w)>0).map(set=>({date:s.date,w:parseFloat(set.w)}));
  }));
  
  if(chartInst){chartInst.destroy();chartInst=null;}
  if(!allSets.length){
    const ctx=document.getElementById('progress-chart').getContext('2d');
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    return;
  }
  
  const grouped={};
  allSets.forEach(s=>{
    if(!grouped[s.date])grouped[s.date]=[];
    grouped[s.date].push(s.w);
  });
  const pts=Object.entries(grouped).map(([date,weights])=>({date,w:Math.max(...weights)}));
  
  const ctx=document.getElementById('progress-chart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:pts.map(p=>p.date),
      datasets:[{
        label:'最大重量 (kg)',
        data:pts.map(p=>p.w),
        borderColor:'#111',
        backgroundColor:'rgba(17,17,17,0.06)',
        pointBackgroundColor:'#111',
        pointRadius:4,
        tension:0.3,
        fill:true
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'#f0f0f0'},ticks:{font:{size:10},color:'#888'}},
        y:{grid:{color:'#f0f0f0'},ticks:{font:{size:10},color:'#888'},beginAtZero:false}
      }
    }
  });
}

function exportObsidian(){
  const s=students[cur];
  const list=getSessions(cur);
  let md=`# ${s.name} — TcT 訓練紀錄\n\n`;
  md+=`> 備註：${s.memo||'無'}\n\n`;
  md+=`## 固定課表\n`;
  (s.defaultMoves||[]).forEach(m=>md+=`- ${m}\n`);
  md+=`\n## 固定回家功課\n`;
  (s.defaultHW||[]).forEach(h=>md+=`- ${h}\n`);
  md+=`\n---\n\n## 課程紀錄（${list.length} 堂）\n\n`;
  list.forEach(sess=>{
    md+=`### ${sess.date}\n\n`;
    (sess.moves||[]).forEach(m=>{
      const name=m.name==='[自訂動作]'&&m.customName?m.customName:m.name;
      const custom=m.customName&&m.name!=='[自訂動作]'?` (${m.customName})`:'';
      md+=`**${name}${custom}**\n`;
      (m.sets||[]).forEach((s,i)=>{
        const parts=[];
        if(s.w)parts.push(`${s.w}kg`);
        if(s.r)parts.push(`${s.r}次`);
        if(s.sec)parts.push(`${s.sec}秒`);
        md+=`- 組${i+1}：${parts.join(' × ')||'—'}\n`;
      });
      md+=`\n`;
    });
    if(sess.hw&&sess.hw.length){
      md+=`**回家功課：** ${sess.hw.join('、')}\n`;
      if(sess.hwNote)md+=`> ${sess.hwNote}\n`;
    }
    if(sess.special)md+=`\n**特殊注意：** ${sess.special}\n`;
    if(sess.note)md+=`\n**教練備註：** ${sess.note}\n`;
    md+=`\n`;
  });
  md+=`---\n*本檔案由 TcT 個人化訓練系統自動生成*\n`;
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`TcT_${s.name}_${new Date().toISOString().split('T')[0]}.md`;
  a.click();
}

function exportData(){
  const data={
    version:'4.0',
    exportTime:new Date().toISOString(),
    students:students,
    sessions:sessions
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`TcT_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  alert('資料已匯出！可在其他裝置匯入此檔案。');
}

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.students||!data.sessions){
        alert('檔案格式錯誤！');
        return;
      }
      mergeData(data.students,data.sessions);
      alert(`匯入成功！\n學員數：${students.length}\n總課程：${Object.values(sessions).flat().length}`);
      goList();
    }catch(err){
      alert('匯入失敗：'+err.message);
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

function mergeData(importStudents,importSessions){
  importStudents.forEach((impStu,impIdx)=>{
    const existIdx=students.findIndex(s=>s.name===impStu.name);
    if(existIdx===-1){
      students.push(impStu);
      const newIdx=students.length-1;
      sessions[newIdx]=importSessions[impIdx]||[];
    }else{
      students[existIdx]={...students[existIdx],...impStu};
      const existSess=sessions[existIdx]||[];
      const impSess=importSessions[impIdx]||[];
      const merged=mergeSessions(existSess,impSess);
      sessions[existIdx]=merged;
    }
  });
  persist();
}

function mergeSessions(existing,imported){
  const map=new Map();
  existing.forEach(s=>map.set(s.date,s));
  imported.forEach(s=>{
    if(!map.has(s.date)||s.ts>map.get(s.date).ts){
      map.set(s.date,s);
    }
  });
  return Array.from(map.values()).sort((a,b)=>b.ts-a.ts);
}

goList();
